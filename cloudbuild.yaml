steps:
  - id: install
    name: 'node:20'
    entrypoint: npm
    args: ['ci']

  - id: lint
    name: 'node:20'
    entrypoint: npm
    args: ['run', 'lint']
    waitFor: ['install']

  - id: compile
    name: 'node:20'
    entrypoint: npm
    args: ['run', 'compile']
    waitFor: ['install']

  - id: package
    name: 'node:20'
    entrypoint: npx
    args: ['@vscode/vsce', 'package', '--no-dependencies']
    waitFor: ['compile']

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY
